# wrangler.toml
# MUNSAQAH / OD Academy - Cloudflare Worker + Static Assets
# مهم: لا تضع أي مفاتيح سرية داخل هذا الملف.

name = "munsaqah"
main = "worker/index.js"
compatibility_date = "2026-06-19"

# يمنع Wrangler من حذف/تجاوز المتغيرات والأسرار التي أضفتها من Cloudflare Dashboard عند النشر.
keep_vars = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[ai]
binding = "AI"

[vars]
ALLOWED_ORIGINS = "https://munsaqah.rayansalajlan.workers.dev"
GEMINI_MODEL = "gemini-2.5-flash"
BREVO_SENDER_EMAIL = "rayan.al.ajlan123@gmail.com"
BREVO_SENDER_NAME = "MUNSAQAH Academy"
SITE_URL = "https://munsaqah.rayansalajlan.workers.dev"
VITE_SUPABASE_URL = "https://vajfguzaylvddcyywmco.supabase.co"
