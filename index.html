<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/site-icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preload" href="/brand/munsaqah-horizontal-official.png" as="image" type="image/png" />

    <meta name="theme-color" content="#0c0717" />
    <style>
      html { background-color: #0c0717; }
    </style>
    <meta property="og:image" content="/brand/og-image.png" />
    <meta name="twitter:image" content="/brand/og-image.png" />

    <script type="application/ld+json" id="site-jsonld-logo">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "OD Academy",
        "logo": "/brand/munsaqah-horizontal-official.png",
        "image": "/brand/og-image.png"
      }
    </script>

    <title>OD Academy</title>
  </head>
  <body class="od-theme-dark">
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("odacademy_theme_mode");
          var t = stored === "light" ? "light" : "dark";
          var de = document.documentElement;
          var b = document.body;
          de.dataset.theme = t;
          de.style.colorScheme = t;
          de.style.backgroundColor = t === "dark" ? "#0c0717" : "#f3eefb";
          b.classList.toggle("od-theme-dark", t === "dark");
          b.classList.toggle("od-theme-light", t !== "dark");
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
