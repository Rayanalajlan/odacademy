<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>منسقة</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
        font-family: "IBM Plex Sans Arabic", "Tajawal", "Segoe UI", Tahoma, Arial, sans-serif;
        background:
          radial-gradient(circle at 50% 18%, rgba(167, 139, 250, .24), transparent 30%),
          linear-gradient(180deg, #120a22 0%, #090412 100%);
        color: #f8f4ff;
      }

      @media (prefers-color-scheme: light) {
        body {
          background:
            radial-gradient(circle at 50% 18%, rgba(139, 92, 246, .14), transparent 30%),
            linear-gradient(180deg, #f7f3ff 0%, #efe9fb 100%);
          color: #241a3d;
        }
      }

      .card {
        max-width: 420px;
        display: grid;
        gap: 14px;
        justify-items: center;
      }

      .card img {
        width: 96px;
        height: 96px;
        object-fit: contain;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 900;
        line-height: 1.6;
      }

      p {
        margin: 0;
        font-size: 15px;
        line-height: 1.9;
        opacity: .85;
      }

      button {
        margin-top: 8px;
        padding: 12px 28px;
        min-height: 44px;
        border: 0;
        border-radius: 999px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        box-shadow: 0 14px 30px rgba(124, 58, 237, .30);
      }

      button:focus-visible {
        outline: 3px solid rgba(167, 139, 250, .8);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <div class="card" role="status">
      <img src="/brand/munsaqah-icon-official.png" alt="شعار منسقة" />
      <h1>لا يوجد اتصال بالإنترنت حاليًا</h1>
      <p>تحقق من اتصالك ثم أعد المحاولة للعودة إلى المنصة.</p>
      <button type="button" onclick="location.reload()">إعادة المحاولة</button>
    </div>
  </body>
</html>
